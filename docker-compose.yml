version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ./docker/api.dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      EMBASSYAIRLINES_JwtSettings__Secret: 'supersecret'
      EMBASSYAIRLINES_NpgSqlConnection__Host: 'postgres'
      EMBASSYAIRLINES_NpgSqlConnection__Port: '5432'
      EMBASSYAIRLINES_NpgSqlConnection__Database: 'fakebase'
      EMBASSYAIRLINES_NpgSqlConnection__Username: 'stupid'
      EMBASSYAIRLINES_NpgSqlConnection__Password: 'bastard'
      EMBASSYAIRLINES_Redis__ConnectionString: 'redis:6379'
      EMBASSYAIRLINES_Redis__InstanceName: 'embassyairlines'
    ports:
      - "5000:5000"

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: 'stupid'
      POSTGRES_PASSWORD: 'bastard'
      POSTGRES_DB: 'fakebase'
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    expose:
      - 6379
    restart: always

volumes:
  postgres-data:
