version: "3.8"

services:
  fleet-api:
    build:
      context: .
      dockerfile: ./docker/fleet-api.dockerfile
    restart: always
    environment:
      ASPNETCORE_URLS: ${fleeturls}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${pubkey}
      ASPNETCORE_Kestrel__Certificates__Default__KeyPath: ${privkey}
      FLEETAPI_Database: ${fleetcs}
      FLEETAPI_Redis__ConnectionString: ${fleetcache}
      FLEETAPI_Redis__InstanceName: ${fleetcacheinstance}
    volumes:
      - letsencrypt:/https
    expose:
      - 5010
      - 5011
    logging:
      driver: ${logdriver}
      options:
        tag: "fleet-api"

  fleet-db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: ${fleetdb}
      POSTGRES_USER: ${fleetuser}
      POSTGRES_PASSWORD: ${fleetpassword}
    ports:
      - 5440:5432
    volumes:
      - fleet_data:/var/lib/postgresql/data

  fleet-cache:
    image: redis:latest
    expose:
      - 6300
    volumes:
      - fleet_cache:/data
    restart: always

  gateway-api:
    build:
      context: .
      dockerfile: ./docker/gateway-api.dockerfile
    restart: always
    environment:
      ASPNETCORE_URLS: ${gatewayurls}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${pubkey}
      ASPNETCORE_Kestrel__Certificates__Default__KeyPath: ${privkey}
    volumes:
      - letsencrypt:/https
    expose:
      - 5000
      - 5001

  seq:
    image: datalust/seq:latest
    restart: always
    environment:
      - ACCEPT_EULA=Y
    expose:
      - 5341
      - 8081

volumes:
  letsencrypt:
  fleet_data:
  fleet_cache:
